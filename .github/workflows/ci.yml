name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (strict type check)
        run: mypy src

      - name: Pytest (unit + integration, with coverage)
        run: pytest --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build distributable package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
      - name: Verify CLI installs and runs from the built wheel
        run: |
          pip install dist/*.whl
          migration-factory ingest tests/fixtures/sample_terraform.tfstate > /tmp/report.json
          python -c "import json; d=json.load(open('/tmp/report.json')); assert len(d['graph']['resources']) == 6, d"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
